# 示例批量任务 - 清洗财务报表
name: clean_financial_reports
description: 批量提取和分类财务PDF中的表格数据

# 输入源 (支持 glob 模式)
input:
  paths:
    - ./data/reports/*.pdf
    - ./data/tables/*.xlsx
    - ./data/tables/*.csv

# 处理配置
processing:
  skill: extract_table              # 指定 skill (不指定则自动路由)
  # model: google/gemini-2.0-flash-001  # 覆盖默认模型 (可选)
  concurrency: 5                    # 并发数
  retry: 2                          # 失败重试次数

# 输出配置
output:
  directory: ./output/batch_results/
  format: jsonl                     # json | jsonl | csv
  # save_raw: false                 # 是否保存原始 LLM 响应
